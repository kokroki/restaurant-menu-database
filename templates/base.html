<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Меню ресторана</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body {
    background-color: #eef0eb;
    color: #1f2933;
    font-family: system-ui;
}

.home-wrapper {
    max-width: 900px;
    margin: 40px auto;
}

.home-title {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 40px;
    color: #1f2933;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
}

.stat-box {
    background: white;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    text-align: center;
    transition: 0.2s;
}

.stat-box:hover {
    transform: translateY(-3px);
}

.stat-number {
    font-size: 40px;
    font-weight: 600;
    color: #195127;
    margin-bottom: 10px;
}

.stat-label {
    font-size: 14px;
    color: #6b7280;
}


/* SIDEBAR */

.sidebar {
    height: 100vh;
    width: 240px;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #0A2E3C;
    padding-top: 30px;
    box-shadow: 2px 0 8px rgba(0,0,0,0.08);
}

.sidebar h5 {
    color: white;
    font-weight: 600;
}

.sidebar a {
    padding: 14px 24px;
    display: block;
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.sidebar a:hover {
    background-color: #124559;
}

.sidebar-title {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin: 18px 20px 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* CONTENT */

.content {
    margin-left: 260px;
    padding: 40px;
}

/* PAGE TITLE */

.page-title {
    margin-bottom: 30px;
}

/* BUTTON STYLE */

.btn-primary {
    background-color: #195127;
    border: none;
    color: white;
    transition: 0.2s;
}

.btn-primary:hover {
    background-color: #245931;
    transform: translateY(-1px);
}

.btn-full-add {
    background-color: #1C532A;
    color: white;
    border: none;
    font-weight: 500;
    transition: 0.2s;
}

.btn-full-add:hover {
    background-color: #245931;
    color: white;
    transform: translateY(-1px);
}

/* TABLE STYLE */

.table {
    background-color: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.table tbody tr:hover {
    background-color: #f4f6f5;
}

/* CARD EFFECT */

.table tr {
    background-color: white;
}

</style>

</head>

<body>

<div class="sidebar">

<h5 class="text-center">МЕНЮ РЕСТОРАНА</h5>
<h6 class="sidebar-title">Блюда</h6>

<a href="/dishes/">Блюда</a>
<a href="/dish_types/">Типы блюд</a>
<a href="/dish_components/">Состав блюд</a>

<h6 class="sidebar-title">Компоненты</h6>

<a href="/components/">Компоненты</a>
<a href="/component_microelements/">Состав компонентов</a>

<h6 class="sidebar-title">Микроэлементы</h6>

<a href="/microelements/">Микроэлементы</a>
<a href="/daily_microelement_requirements/">Суточные нормы</a>

<h6 class="sidebar-title">Отчёты</h6>

<a href="/reports/microelement-coverage/">Покрытие нормы микроэлементов</a>
<a href="/reports/profit/">Прибыль блюд</a>
<a href="/reports/calories-by-type/">Калорийность по типам блюд</a>
</div>


<div class="content">

{% block content %}
{% endblock %}

</div>


</body>
</html>
